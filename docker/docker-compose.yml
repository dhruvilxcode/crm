version: '3.7'
name: crm
services:
  mariadb:
    image: 'mariadb:10.8'
    command:
      - '--character-set-server=utf8mb4'
      - '--collation-server=utf8mb4_unicode_ci'
      - '--skip-character-set-client-handshake'
      - '--skip-innodb-read-only-compressed'
    environment:
      MYSQL_ROOT_PASSWORD: 123
    volumes:
      - 'mariadb-data:/var/lib/mysql'
  redis:
    image: 'redis:alpine'
  frappe:
    image: 'frappe/bench:latest'
    command: bash -c "curl -sL https://raw.githubusercontent.com/frappe/crm/develop/docker/init.sh | bash"
    environment:
      - SHELL=/bin/bash
    working_dir: /home/frappe
    expose:
      - "8000"
    # volumes:
    #   - '.:/workspace'
    # Ports removed to prevent host conflicts on Coolify. 
    # Coolify's proxy will route traffic to port 8000 internally.
    # ports:
    #   - '8000:8000'
    #   - '9000:9000'
volumes:
  mariadb-data: null
